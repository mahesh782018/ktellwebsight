<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now - K-Tell Technologies</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .join-container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 50px auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .join-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0d6efd;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            background: #0d6efd;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #084298;
        }

        footer {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        @media(max-width:600px) {
            .join-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>K-Tell Technologies</h1>
        <p>Join Our CRT Training Program</p>
    </header>

    <div class="join-container">

        <h2>Registration Form</h2>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>Select Course</label>

                <select required>
                    <option value="">-- Choose Course --</option>
                    <option>Aptitude Training</option>
                    <option>Reasoning</option>
                    <option>Python Programming</option>
                    <option>Web Development</option>
                    <option>Java Programming</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea rows="4" placeholder="Enter your message"></textarea>
            </div>

            <button type="submit" class="btn">
                Register Now
            </button>

        </form>

    </div>

    <footer>
        <p>© 2026 Kay Tell Technologies | All Rights Reserved</p>
    </footer>

</body>

</html>
